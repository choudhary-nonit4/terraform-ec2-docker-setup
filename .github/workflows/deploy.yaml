name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest ./app

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            echo "Starting deployment..."

            cd /home/ec2-user

            # Install git
            sudo yum install -y git

            # Install Docker if missing
            if ! command -v docker &> /dev/null
            then
              sudo amazon-linux-extras install docker -y
            fi

            # Start Docker
            sudo systemctl start docker || sudo service docker start
            sudo systemctl enable docker

            # Install docker-compose (FORCE INSTALL)
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose

            # Verify install (IMPORTANT DEBUG)
            sudo /usr/local/bin/docker-compose version

            # Clone or pull repo
            if [ ! -d "devops-project" ]; then
              git clone https://github.com/${{ github.repository }} devops-project
            fi

            cd devops-project
            git pull

            # Pull latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

            # Run using FULL PATH (IMPORTANT FIX)
            sudo /usr/local/bin/docker-compose down || true
            sudo /usr/local/bin/docker-compose up -d

            # Debug
            sudo docker ps

            echo "Deployment completed!"