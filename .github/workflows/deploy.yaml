name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest ./app

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Starting deployment..."

            # Ensure Docker is installed (safety)
            if ! command -v docker &> /dev/null
            then
              echo "Docker not found. Installing..."
              sudo yum update -y
              sudo amazon-linux-extras install docker -y
            fi

            # Start Docker service
            sudo systemctl start docker || sudo service docker start
            sudo systemctl enable docker

            # Stop & remove old container
            sudo docker stop devops-container || true
            sudo docker rm devops-container || true

            # Pull latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

            # Run new container
            sudo docker run -d -p 8080:8080 --name devops-container ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

            echo "Deployment completed!"