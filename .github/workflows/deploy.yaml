name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔐 Login to Docker Hub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build & Push Backend
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./services/backend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # 🐳 Build & Push API Gateway
      - name: Build Gateway Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest ./services/api-gateway

      - name: Push Gateway Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest

      # 🚀 Deploy to EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting deployment..."

            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            cd /home/ec2-user/devops-project

            # Pull latest images
            sudo docker pull $DOCKER_USERNAME/backend:latest
            sudo docker pull $DOCKER_USERNAME/api-gateway:latest

            # Stop old containers
            sudo /usr/local/bin/docker-compose down || true

            # Cleanup
            sudo docker system prune -f || true

            # 👇 PASS ENV INSIDE SUDO (THIS IS THE FIX)
            sudo DOCKER_USERNAME=$DOCKER_USERNAME /usr/local/bin/docker-compose up -d

            echo "Deployment completed!"