name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, api-gateway]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        working-directory: ./services/${{ matrix.service }}

      - name: Run Tests
        run: npm test
        working-directory: ./services/${{ matrix.service }}

      - name: Build Check
        run: docker build -t test-${{ matrix.service }} ./services/${{ matrix.service }}